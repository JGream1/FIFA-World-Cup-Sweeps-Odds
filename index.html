<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>World Cup Sweepstakes Odds</title>

  <style>
    body {
      background: #000;
      color: #eee;
      font-family: system-ui, sans-serif;
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: #00eaff; /* bright cyan accent */
      font-size: 2.4rem;
      margin-bottom: 30px;
      letter-spacing: 1px;
    }

    table {
      margin: 0 auto;
      border-collapse: collapse;
      width: 90%;
      max-width: 600px;
      background: #111;
      border: 2px solid #00eaff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 234, 255, 0.3);
    }

    th {
      background: #00eaff;
      color: #000;
      padding: 12px;
      font-size: 1.1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    td {
      padding: 12px;
      border-bottom: 1px solid #222;
      font-size: 1.05rem;
    }

    tr:nth-child(even) {
      background: #0d0d0d;
    }

    tr:hover {
      background: #111a1a;
    }

    #results {
      margin-top: 20px;
      font-size: 1.2rem;
    }
  </style>
</head>

<body>
  <h1>World Cup Sweepstakes Odds</h1>

  <div id="results">Loading…</div>

  <script>
    /* ============================
       TEAM → OWNER MAPPING
    ============================ */
    const teamOwners = {
      "France": "Bristow",
      "Spain": "Will",
      "Argentina": "Ant",
      "England": "Kerrod",
      "Portugal": "Tom",
      "Brazil": "Marra",
      "Netherlands": "Jaiden",
      "Morocco": "Jacob",
      "Belgium": "Kirrin",
      "Germany": "Jacob",
      "Croatia": "Marra",
      "Colombia": "Kerrod",
      "Senegal": "Tom",
      "Mexico": "Kirrin",
      "USA": "Ant",
      "Uruguay": "Bristow",
      "Japan": "Jacob",
      "Switzerland": "Jaiden",
      "Iran": "Will",
      "Turkey": "Kerrod",
      "Ecuador": "Tom",
      "Austria": "Marra",
      "South Korea": "Jaiden",
      "Australia": "Kerrod",
      "Algeria": "Ant",
      "Egypt": "Marra",
      "Canada": "Kirrin",
      "Norway": "Jacob",
      "Panama": "Kirrin",
      "Ivory Coast": "Ant",
      "Sweden": "Bristow",
      "Paraguay": "Tom",
      "Czech Republic": "Will",   // FIXED NAME
      "Scotland": "Jaiden",
      "Tunisia": "Ant",
      "DR Congo": "Will",
      "Uzbekistan": "Bristow",
      "Qatar": "Bristow",
      "Iraq": "Kirrin",
      "South Africa": "Will",
      "Saudi Arabia": "Jaiden",
      "Jordan": "Marra",
      "Bosnia & Herzegovina": "Kerrod",
      "Cape Verde": "Tom",
      "Ghana": "Jacob"
    };
  
    /* Bottom 3 teams excluded from probability pool */
    const excludedTeams = ["Curaçao", "Haiti", "New Zealand"]; // FIXED NAME
  
    /* ============================
       API CONFIG
    ============================ */
    const API_KEY = '4644152e5c15b57e158b3307680b59d6';
    const ENDPOINT =
      `https://api.the-odds-api.com/v4/sports/soccer_fifa_world_cup_winner/odds?regions=au&markets=outrights&apiKey=${API_KEY}`;
  
    /* ============================
       MAIN FUNCTION
    ============================ */
    async function loadOdds() {
      const container = document.getElementById("results");
      container.textContent = "Loading…";
  
      try {
        const res = await fetch(ENDPOINT);
        const data = await res.json();
  
        if (!data.length) {
          container.textContent = "No odds data returned.";
          return;
        }
  
        const bookmakers = data[0].bookmakers;
  
        /* ============================
           BOOKMAKER PRIORITY:
           1. TAB
           2. Unibet
           3. Betfair
        ============================ */
        let bookmaker =
          bookmakers.find(b => b.key === "tab") ||
          bookmakers.find(b => b.key === "unibet") ||
          bookmakers.find(b => b.key.includes("betfair")) ||
          null;
  
        if (!bookmaker) {
          container.textContent = "No usable bookmaker found.";
          return;
        }
  
        const market = bookmaker.markets.find(m => m.key === "outrights");
        if (!market) {
          container.textContent = "Outrights market not found.";
          return;
        }
  
        /* ============================
           EXTRACT TEAM ODDS
        ============================ */
        const teamOdds = {};
        for (const o of market.outcomes) {
          teamOdds[o.name] = o.price;
        }
  
        /* ============================
           COMPUTE IMPLIED PROBABILITIES
        ============================ */
        const includedTeams = Object.keys(teamOwners)
          .filter(t => !excludedTeams.includes(t));
  
        const implied = {};
        let denom = 0;
  
        for (const team of includedTeams) {
          const odds = teamOdds[team];
          if (!odds) continue;
          const inv = 1 / odds;
          implied[team] = inv;
          denom += inv;
        }
  
        const teamProb = {};
        for (const team of includedTeams) {
          if (implied[team]) {
            teamProb[team] = implied[team] / denom;
          }
        }
  
        /* ============================
           AGGREGATE PER PERSON
        ============================ */
        const personProb = {};
        for (const [team, owner] of Object.entries(teamOwners)) {
          if (!teamProb[team]) continue;
          personProb[owner] = (personProb[owner] || 0) + teamProb[team];
        }
        
        // Determine each person's best remaining team
        const bestTeam = {};
        for (const [team, owner] of Object.entries(teamOwners)) {
          if (!teamProb[team]) continue;
          if (!bestTeam[owner] || teamProb[team] > teamProb[bestTeam[owner]]) {
            bestTeam[owner] = team;
          }
        }
  
        /* ============================
           SORT RESULTS
        ============================ */
        const sorted = Object.entries(personProb)
          .map(([name, prob]) => ({ name, prob }))
          .sort((a, b) => b.prob - a.prob);
  
        /* ============================
           BUILD TABLE
        ============================ */
        let html = `
          <table>
            <tr>
              <th>Person</th>
              <th>Chance of Winning</th>
              <th>Best Chance</th>
            </tr>
        `;
        
        for (const row of sorted) {
          const team = bestTeam[row.name];
          const code = getFlagCode(team);
          const flag = code
            ? `<img src="https://flagcdn.com/48x36/${code}.png" style="width:32px; border-radius:4px;">`
            : "";
        
          html += `
            <tr>
              <td>${row.name}</td>
              <td>${(row.prob * 100).toFixed(2)}%</td>
              <td>${flag} ${team}</td>
            </tr>
          `;
        }
        
        html += "</table>";
        container.innerHTML = html;
  
      } catch (err) {
        container.textContent = "Error loading odds: " + err;
      }
    }

    // Convert team name → ISO country code for flag CDN
    function getFlagCode(team) {
      const map = {
        "France": "fr",
        "Spain": "es",
        "Argentina": "ar",
        "England": "gb",
        "Portugal": "pt",
        "Brazil": "br",
        "Netherlands": "nl",
        "Morocco": "ma",
        "Belgium": "be",
        "Germany": "de",
        "Croatia": "hr",
        "Colombia": "co",
        "Senegal": "sn",
        "Mexico": "mx",
        "USA": "us",
        "Uruguay": "uy",
        "Japan": "jp",
        "Switzerland": "ch",
        "Iran": "ir",
        "Turkey": "tr",
        "Ecuador": "ec",
        "Austria": "at",
        "South Korea": "kr",
        "Australia": "au",
        "Algeria": "dz",
        "Egypt": "eg",
        "Canada": "ca",
        "Norway": "no",
        "Panama": "pa",
        "Ivory Coast": "ci",
        "Sweden": "se",
        "Paraguay": "py",
        "Czech Republic": "cz",
        "Scotland": "gb",
        "Tunisia": "tn",
        "DR Congo": "cd",
        "Uzbekistan": "uz",
        "Qatar": "qa",
        "Iraq": "iq",
        "South Africa": "za",
        "Saudi Arabia": "sa",
        "Jordan": "jo",
        "Bosnia & Herzegovina": "ba",
        "Cape Verde": "cv",
        "Ghana": "gh"
      };
      return map[team] || null;
    }
    
    loadOdds();
  </script>
</body>
</html>
